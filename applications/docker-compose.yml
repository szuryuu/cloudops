services:
  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydatabase
      - DB_PORT=5432
      - DB_HOST=db
    ports:
      - "8000:5000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: mypassword
      POSTGRES_USER: myuser
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
    driver: local
